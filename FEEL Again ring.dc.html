<!DOCTYPE html>
<html style="background:#0c2630;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body style="background:#0c2630;margin:0;">
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Source+Sans+3:wght@400;500;600&family=Spline+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  #eco .mono{font-family:'Spline Sans Mono',monospace;}
  #eco .cond{font-family:'Archivo',sans-serif;}
  #eco ::-webkit-scrollbar{width:8px;height:8px;}
  #eco ::-webkit-scrollbar-thumb{background:rgba(46,96,76,.7);border-radius:4px;}
  #eco ::-webkit-scrollbar-track{background:transparent;}
  #eco[data-view="donor"] .arch-only{display:none!important;}
  #eco[data-view="arch"] .donor-only{display:none!important;}
  .eco-nav{cursor:pointer;transition:all .2s;}
  .eco-nav:hover{background:rgba(18,60,74,.7)!important;}
  .pnode{transition:all .35s;}
  .pnode.lit{box-shadow:0 0 0 1px var(--nc),0 0 18px var(--ng)!important;border-color:var(--nc)!important;background:rgba(18,60,74,.96)!important;transform:translateY(-3px);}
  .pnode.done{border-color:rgba(111,191,168,.4)!important;}
  .pk2{animation:flowx 1.6s linear infinite;}
  @keyframes flowx{from{left:0;opacity:0}10%{opacity:1}90%{opacity:1}to{left:100%;opacity:0}}
  .blink{animation:bl 1.3s ease-in-out infinite;}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.35}}
  .subt{cursor:pointer;transition:all .2s;}
  @keyframes actorPulse{0%{transform:scale(1)}35%{transform:scale(1.3)}100%{transform:scale(1)}}
  @keyframes flowDashFwd{to{background-position:-24px 0;}}
  @keyframes flowDashRev{to{background-position:24px 0;}}
  .hm-step:hover{border-color:rgba(212,165,116,.6)!important;}
  .hm-cta:hover{filter:brightness(1.08);}
  @media(prefers-reduced-motion:reduce){#eco *{animation:none!important;transition:none!important;}}
</style>
</helmet>

<div id="eco" data-view="donor" style="position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Source Sans 3',sans-serif;color:#F5F2ED;background-image:linear-gradient(rgba(106,168,180,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(106,168,180,.05) 1px,transparent 1px),radial-gradient(ellipse 100% 55% at 50% 110%,rgba(212,165,116,.12) 0%,transparent 60%),linear-gradient(180deg,#0a1f28 0%,#0c2630 40%,#0f3744 100%);background-size:64px 64px,64px 64px,100% 100%,100% 100%;overflow:hidden;">

  <!-- UNIFIED RING NAV -->
  <x-import component-from-global-scope="ring-nav" from="./ring-nav.js" active="cabinets" hint-size="100%,236px" style="flex-shrink:0;"></x-import>

  <!-- HEADER -->
  <!-- BODY -->
  <!-- Standalone header strip removed 2026-07-12 (Alex): the bar between the ring and the page
       content read as a redundant duplicate chrome layer. Its content now lives ON the surface —
       the "?" docs button sits directly beside each view's own title (renderHome/renderCabinet),
       and "proof-of-concept" is dropped rather than relocated (was never load-bearing copy). -->
  <!-- Left sidebar (cabinet switcher + integration points + connected minisites) removed 2026-07-10 (Alex):
       fully redundant — the ring's own sub-nav (SUB.cabinets in ring-nav.js: ОГЛЯД/ДОНОР/ВЕНДОР/БЕНЕФІЦІАР/АУДИТОР)
       already drives the same go(k) switch via the ring-subnav listener below. Two navs for one switch was the bug. -->
  <div style="flex:1;display:flex;min-height:0;">
    <!-- STAGE -->
    <main id="eco-stage" style="flex:1;position:relative;overflow:hidden;min-width:0;"></main>

    <!-- DOCS DRAWER -->
    <aside id="eco-docs" style="width:0;flex-shrink:0;border-left:1px solid #2a5562;background:rgba(7,16,13,.92);overflow:hidden;transition:width .3s;">
      <div style="width:300px;padding:20px;height:100%;overflow-y:auto;" id="eco-docs-body"></div>
    </aside>
  </div>

</div>
</x-dc>

    function renderHome(){
      // Sequence/trigger diagram (rebuilt 2026-07-11): 18 nodes = the real beneficiary-journey

      let h=`<div style="padding:22px 26px;height:100%;overflow:auto;display:flex;flex-direction:column;">`;

      h+=`<div style="font-size:.72rem;color:#A9C2C8;margin-top:5px;max-width:640px;line-height:1.5;">${L==='uk'?'Кожен крок — реальний тригер з протоколу співфінансування Feel Again. Дія однієї сторони автоматично викликає реакцію наступної.':'Every step is a real trigger from the Feel Again co-financing protocol. Each actor’s action automatically fires the next.'}</div></div>`;
      h+=`<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">`
        +`<button id="hm-prev" class="mono" style="width:30px;height:30px;border:1px solid #2a5562;background:transparent;color:#A9C2C8;border-radius:2px;cursor:pointer;">‹</button>`
        +`<button id="hm-play" class="mono" style="min-width:78px;height:30px;border:1px solid ${homePlaying?'#D4A574':'#2a5562'};background:${homePlaying?'rgba(212,165,116,.12)':'transparent'};color:${homePlaying?'#D4A574':'#A9C2C8'};border-radius:2px;cursor:pointer;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;">${homePlaying?(L==='uk'?'⏸ Пауза':'⏸ Pause'):(L==='uk'?'▶ Плей':'▶ Play')}</button>`
        +`<button id="hm-next" class="mono" style="width:30px;height:30px;border:1px solid #2a5562;background:transparent;color:#A9C2C8;border-radius:2px;cursor:pointer;">›</button>`
        +`<button id="hm-lang" class="mono" style="height:30px;padding:0 10px;border:1px solid #2a5562;background:transparent;color:#A9C2C8;border-radius:2px;cursor:pointer;font-size:.6rem;letter-spacing:1px;">${L==='uk'?'EN':'UA'}</button>`
        +`<button class="mono eco-docs-btn" style="width:30px;height:30px;border:1px solid ${docsOpen?'#D4A574':'#2a5562'};background:transparent;color:${docsOpen?'#D4A574':'#A9C2C8'};border-radius:2px;cursor:pointer;font-size:.75rem;">?</button>`
        +`</div></div>`;

      // (2026-07-12, Alex: role names were duplicated — this pill legend repeated the exact same

      // progress rail
      h+=`<div style="display:flex;gap:3px;margin-bottom:12px;">`;

      h+=`</div>`;

      // ─── unified per-step row: lane visual + its OWN label share one flex row, so the name is
      // always physically attached to its icons. Lane column is now a PERCENTAGE (not a fixed px)

      // percentage and is sticky, so it rides along the top of the viewport as you scroll down
      // instead of scrolling away with the rows (2026-07-12, Alex).
      const N=LANES.length, LANE_PCT=44;
      const laneIdx=k=>LANES.indexOf(k);
      const dim=k=>homeHighlight && CAB_ACTOR[homeHighlight]!==k;
      h+=`<div style="border:1px solid rgba(38,90,108,.5);border-radius:2px;background:rgba(8,18,15,.4);overflow:hidden;flex-shrink:0;">`;
      h+=`<div style="position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:10px 14px;background:#0e1c17;border-bottom:1px solid rgba(38,90,108,.5);">`;
      h+=`<div style="width:${LANE_PCT}%;flex-shrink:0;display:grid;grid-template-columns:repeat(${N},1fr);">`;
      LANES.forEach(k=>{

          +`<span class="mono" style="font-size:.46rem;letter-spacing:.3px;color:${a.color};text-align:center;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${tt(a).split(' / ')[0].split(' ')[0]}</span>`

      h+=`</div>`;

      let lastPhase=null;

        if(n.phase && n.phase!==lastPhase){
          lastPhase=n.phase;
          h+=`<div class="mono" style="font-size:.5rem;letter-spacing:3px;text-transform:uppercase;color:#F0D9B0;margin:${i?7:2}px 0 3px;">${L==='uk'?n.phase:PHASE_EN[n.phase]}</div>`;
        }
        const active=i===homeIdx, passed=i<homeIdx;
        const src=n.actors[0], tgt=n.actors[1];
        const srcI=laneIdx(src), tgtI=(tgt!==undefined)?laneIdx(tgt):-1;
        const rowOpacity=(passed||active?1:.4) * ((dim(src)&&(tgtI<0||dim(tgt)))?.4:1);
        h+=`<div class="hm-step" data-i="${i}" style="display:flex;align-items:center;gap:14px;padding:4px 6px;margin-bottom:1px;border-radius:2px;cursor:pointer;background:${active?'rgba(18,60,74,.85)':'transparent'};opacity:${rowOpacity};transition:opacity .25s,background .25s;">`;
        h+=`<div style="position:relative;width:${LANE_PCT}%;flex-shrink:0;height:26px;">`;
        if(tgtI>=0){
          const lo=Math.min(srcI,tgtI), hi=Math.max(srcI,tgtI);
          const leftPct=(lo+0.5)/N*100, widthPct=(hi-lo)/N*100;
          const dir=tgtI>srcI?'fwd':'rev';
          const col=active?ACTORS[tgt].color:'rgba(140,168,172,.35)';
          h+=`<div style="position:absolute;left:${leftPct}%;width:${widthPct}%;top:12px;height:2px;background-image:linear-gradient(90deg,${col} 0 6px,transparent 6px 12px);background-size:24px 2px;background-repeat:repeat-x;${active?`animation:flowDash${dir==='fwd'?'Fwd':'Rev'} .6s linear infinite;`:''}"></div>`;
          const arrowPct=(tgtI>srcI?hi+0.5:lo+0.5)/N*100;
          h+=`<div style="position:absolute;left:calc(${arrowPct}% - 5px);top:6px;font-size:.58rem;color:${active?ACTORS[tgt].color:'#5f8088'};">${tgtI>srcI?'▸':'◂'}</div>`;
        }
        n.actors.forEach(k=>{
          const li=laneIdx(k), leftPct=(li+0.5)/N*100;
          h+=`<div style="position:absolute;left:${leftPct}%;top:0;transform:translate(-50%,0);width:18px;height:18px;border-radius:50%;border:1.5px solid ${ACTORS[k].color};background:#0c2630;display:flex;align-items:center;justify-content:center;color:${ACTORS[k].color};${active?'animation:actorPulse .9s ease;':''}">${actorIcon(ACTORS[k].icon,10)}</div>`;
        });
        h+=`</div>`;
        h+=`<div style="flex:1;min-width:0;"><span class="cond" style="font-size:.74rem;font-weight:600;color:${active?'#F5F2ED':'#8CA8AC'};">${tt(n.t)}</span>`
          +`<span style="font-size:.6rem;color:#A9C2C8;margin-left:8px;">${tt(n.d)}</span></div>`;
        h+=`</div>`;
        if(n.branch){

            +`<div style="border:1px dashed rgba(111,191,168,.5);border-radius:2px;padding:5px 9px;font-size:.56rem;color:#8FD0B8;">→ <b>${tt(b.b.label)}</b> <span style="color:#A9C2C8;">${tt(b.b.note)}</span></div>`
            +`<div style="border:1px dashed rgba(140,168,172,.5);border-radius:2px;padding:5px 9px;font-size:.56rem;color:#8CA8AC;">⇥ <b>${tt(b.a.label)}</b> <span style="color:#A9C2C8;">${tt(b.a.note)}</span></div>`
            +`</div>`;
        }
      });
      h+=`</div></div>`;

      // terminal: qualifying-question LINKS (not buttons/cards) — clicking the question itself is
      // what opens the cabinet; phrased first-person the way the visitor would ask an assistant.
      h+=`<div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(38,90,108,.6);">`;
      h+=`<div class="mono" style="font-size:.54rem;letter-spacing:3px;text-transform:uppercase;color:#5f8088;margin-bottom:10px;">${L==='uk'?'З ЧОГО ПОЧАТИ':'WHERE TO START'}</div>`;
      h+=`<div style="display:flex;flex-direction:column;gap:9px;">`;

        +`<span style="flex-shrink:0;">${actorIcon(icon,15)}</span>`
        +`<span class="cond" style="font-size:.82rem;font-weight:500;text-decoration:underline;text-underline-offset:3px;text-decoration-color:${color}66;">«${q}»</span></div>`;
      h+=qLink('beneficiary',ACTORS.benef.color,'person',L==='uk'?'Мене накрила тривога, відколи почалась війна — з чого почати?':'Anxiety hit me hard since the war started — where do I begin?');
      h+=qLink('provider',ACTORS.spec.color,'person',L==='uk'?'У мене є диплом психолога і час на кількох клієнтів на тиждень — як приєднатися?':'I have a psychology diploma and time for a few clients a week — how do I join?');
      h+=qLink('donor',ACTORS.donor.color,'coin',L==='uk'?'Хочу профінансувати конкретні сесії, а не абстрактний фонд — покажіть як':'I want to fund specific sessions, not an abstract pool — show me how');
      h+=`</div>`;
      h+=`<div style="margin-top:12px;font-size:.6rem;color:#5f8088;">${L==='uk'?'Банк, фонди та P2P-контриб’ютори долучаються через кабінет донора.':'Banks, funds, and P2P contributors join via the donor cabinet.'} · <span class="hm-cta" data-go="auditor" style="cursor:pointer;text-decoration:underline;color:#8CA8AC;">${L==='uk'?'Кабінет аудитора':'Auditor cabinet'}</span></div>`;
      h+=`</div>`;

      h+=`</div>`;
      // Preserve exact scroll position across re-render (no forced jump — Alex: autoplay/clicks
      // yanking the viewport meant nobody could keep up reading). The scroll-driven neon highlight
      // below is what surfaces the active step now: as the user scrolls at their OWN pace, whichever
      // row crosses the center band lights up — no viewport movement is ever triggered from JS.
      const __prevScroll = stage.firstElementChild ? stage.firstElementChild.scrollTop : 0;
      stage.innerHTML=h;
      const scroller = stage.firstElementChild;
      if(scroller) scroller.scrollTop = __prevScroll;

      stage.querySelectorAll('.hm-step').forEach(el=>el.addEventListener('click',()=>{homeIdx=+el.dataset.i;homePlaying=false;clearHomeTimer();renderHome();}));
      stage.querySelectorAll('.hm-cta').forEach(el=>el.addEventListener('click',()=>go(el.dataset.go)));
      bindDocsBtn();

      // ─── scroll-linked neon highlight: re-attach each render since innerHTML replaced the nodes.
      // Whichever step's row crosses the center band becomes "active" (homeIdx) — driven purely by
      // the user's own scroll, at their own speed. No auto-scroll, no forced pacing.
      if(homeScrollObs) homeScrollObs.disconnect();
      if(scroller){
        homeScrollObs = new IntersectionObserver(entries=>{
          entries.forEach(en=>{
            if(en.isIntersecting){
              const i=+en.target.dataset.i;
              if(i!==homeIdx){ homeIdx=i; homePlaying=false; clearHomeTimer(); renderHome(); }
            }
          });
        }, {root:scroller, rootMargin:'-46% 0px -46% 0px', threshold:0});
        scroller.querySelectorAll('.hm-step').forEach(el=>homeScrollObs.observe(el));
      }
      const prevB=$('hm-prev'),nextB=$('hm-next'),playB=$('hm-play'),langB=$('hm-lang');
      if(prevB)prevB.onclick=()=>{homeIdx=Math.max(0,homeIdx-1);homePlaying=false;clearHomeTimer();renderHome();};
      if(nextB)nextB.onclick=()=>{homeIdx=Math.min(SEQUENCE.length-1,homeIdx+1);homePlaying=false;clearHomeTimer();renderHome();};
      if(playB)playB.onclick=()=>{homePlaying=!homePlaying;if(homePlaying)startHomeTimer();else clearHomeTimer();renderHome();};
      if(langB)langB.onclick=()=>{homeLang=homeLang==='uk'?'en':'uk';renderHome();};
    }

        h+=`<div style="border:1.5px solid #D4A574;border-radius:2px;padding:11px 14px;background:rgba(212,165,116,.09);margin-bottom:14px;max-width:640px;">`
          +`<div class="cond" style="font-size:.78rem;font-weight:700;color:#F0D9B0;">Ви — «втрачена середина», яку добудовує платформа</div>`
          +`<div style="font-size:.62rem;color:#D9C2A0;margin-top:4px;line-height:1.5;">Сімейні лікарі перевантажені й не мають куди скерувати легкі/середні випадки; психіатрія — останній рубіж, не перша точка входу. Приватна практика, гуманітарні респондери та перекваліфіковані фахівці — довірений цифровий шар МІЖ ними. Платформа легалізує вашу практику й дає потік клієнтів, не забираючи вашу автономію.</div></div>`;
        h+=`<div style="border:1px solid rgba(38,90,108,.6);border-radius:2px;padding:10px 14px;margin-bottom:14px;max-width:640px;">`
          +`<div class="mono" style="font-size:.5rem;letter-spacing:1.5px;color:#5f8088;margin-bottom:4px;">СПІВФІНАНСУВАННЯ · ОПЛАТА ПОСЛУГ</div>`
          +`<div style="font-size:.68rem;color:#D7E3E0;line-height:1.5;">Ви завжди отримуєте 100% ставки за сесію: 70% з основного пулу відразу після підтвердження, 30% з бюджету донора протягом циклу верифікації. Жодних затримок через брак коштів у клієнта — платформа несе цей ризик, не ви.</div></div>`;
      }
      if(key==='donor'){
        h+=`<div style="border:1px solid rgba(38,90,108,.6);border-radius:2px;padding:10px 14px;margin-bottom:14px;max-width:640px;">`
          +`<div class="mono" style="font-size:.5rem;letter-spacing:1.5px;color:#5f8088;margin-bottom:4px;">СПІВФІНАНСУВАННЯ · ВАШ ВНЕСОК</div>`
          +`<div style="font-size:.68rem;color:#D7E3E0;line-height:1.5;">Ви ніколи не закриваєте весь курс самі. Основний пул платформи бере 70% кожної сесії — ваш бюджет цільово покриває решту 30% для обраної групи (напр. ветерани). Той самий результат, у 3+ рази менший чек на бенефіціара.</div></div>`;
      }
      if(key==='beneficiary'){
        h+=`<div style="border:1px solid rgba(111,191,168,.5);border-radius:2px;padding:10px 14px;margin-bottom:14px;max-width:640px;background:rgba(111,191,168,.06);">`
          +`<div class="mono" style="font-size:.5rem;letter-spacing:1.5px;color:#6FBFA8;margin-bottom:4px;">СПІВФІНАНСУВАННЯ · ДЛЯ ВАС</div>`
          +`<div style="font-size:.68rem;color:#D7E3E0;line-height:1.5;">Ви нічого не платите з власної кишені. Вартість курсу покривають основний пул платформи та бюджет донора — ваша частина завжди 0 ₴. Все, що від вас потрібно — пройти скринінг і підтвердити сесію.</div></div>`;
      }
      // stage sub-nav
      h+=`<div style="display:flex;gap:0;margin:14px 0 6px;border:1px solid #2a5562;border-radius:3px;overflow:hidden;width:max-content;">`;
      c.stages.forEach((s,i)=>{
        const on=i===si;
        h+=`<div class="subt" data-si="${i}" style="padding:8px 18px;font-family:'Spline Sans Mono',monospace;font-size:.56rem;letter-spacing:1.5px;text-transform:uppercase;background:${on?c.color:'transparent'};color:${on?'#0c2630':'#A9C2C8'};font-weight:${on?'700':'400'};border-right:${i<c.stages.length-1?'1px solid #2a5562':'none'};">${i+1}. ${s.t}</div>`;
      });
      h+=`</div>`;
      const s=c.stages[si];
      h+=`<div style="font-size:.7rem;color:#A9C2C8;margin-bottom:18px;">${s.sub}</div>`;
      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">${s.cards.join('')}</div>`;
      // flow strip
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:22px;">`;
      c.stages.forEach((st,i)=>{
        h+=`<div class="subt" data-si="${i}" style="display:flex;align-items:center;gap:8px;">`;
        h+=`<span style="font-family:'Spline Sans Mono',monospace;font-size:.56rem;letter-spacing:1px;color:${i<=si?c.tint:'#5f8088'};text-transform:uppercase;">${st.t}</span>`;
        if(i<c.stages.length-1)h+=`<span style="color:${i<si?c.color:'#2a5562'};">→</span>`;
        h+=`</div>`;
      });
      h+=`</div></div>`;
      stage.innerHTML=h;
      stage.querySelectorAll('.subt').forEach(el=>el.addEventListener('click',()=>{cabStage[key]=+el.dataset.si;renderCabinet(key);}));
      bindDocsBtn();
    }

    // ─────────── shared docs-drawer toggle (button is re-rendered per view, so re-bind each time) ───────────
    function toggleDocs(){
      docsOpen=!docsOpen;
      $('eco-docs').style.flex=docsOpen?'0 0 301px':'0 0 0px';
      $('eco-docs').style.width=docsOpen?'301px':'0';
      renderDocs();
      if(cur==='home')renderHome(); else renderCabinet(cur);
    }
    function bindDocsBtn(){ document.querySelectorAll('.eco-docs-btn').forEach(b=>{ b.onclick=toggleDocs; }); }

    function go(k){
      cur=k;
      clearHomeTimer();
      if(k==='home'){ homeIdx=0; homePlaying=true; renderHome(); startHomeTimer(); }
      else renderCabinet(k);
      renderDocs();
    }

    // ─────────── (hover-reveal trace card + runTrace/runTraceFrom/showNodeInfo removed 2026-07-10)
    // The vertical sequence diagram (seqCardHTML above) shows every step's description, standard,
    // and amount inline and permanently — there is nothing left to reveal on hover or animate
    // through, so the floating trace-card and its trigger button/hover bindings are gone, not
    // just hidden. The Donor/Architect view toggle is gone too; view stays fixed at 'donor'.

    // ─────────── DOCS DRAWER ───────────
    let docsOpen=false;
    const DOCS={
      home:{t:'Шлях бенефіціара',donor:'Цей екран показує повний шлях бенефіціара — від першого перенаправлення до завершення курсу — і всіх, хто реагує на кожен тригер: фахівця, платформу, донора, банк, найближче оточення. Це реальна послідовність з протоколу співфінансування Feel Again, включно з обома точками виходу (легка травма → державна служба «Ти як»).',arch:'Actor/trigger sequence sourced from the two Horizon-application source docs (participant relations scheme + processes & legal framework). 18 ordered trigger nodes, 2 legal-branch exits, 3 contract types (co-financing / service / funding). Replaces the earlier speculative ISO20022/FHIR/on-chain donor pipeline, which was never grounded in a real source document.'},
      donor:{t:'Кабінет донора',donor:'Донор бачить, куди йдуть кошти і скільки результатів уже підтверджено. Кожен підтверджений кейс має простежуваний слід — від внеску до клінічного результату.',arch:'Donor read-model aggregates OutcomeAttestation VCs and settlement receipts. Allocation ledger earmarks funds to a CarePlan-bound outcome price. Reporting frameworks export per-donor compliance rows referencing VC + tx hashes.'},
      provider:{t:'Кабінет провайдера',donor:'Провайдер веде пацієнтів і подає клінічні результати. Виплата надходить автоматично після незалежного підтвердження результату.',arch:'Provider authenticated via W3C VC (ProviderAccreditation), cross-checked with ЄСОЗ. Patient data as FHIR Patient/CarePlan/Encounter/Observation. Outcome submission triggers verification → ISO 20022 pacs.008 settlement from escrow.'},
      beneficiary:{t:'Кабінет пацієнта',donor:'Пацієнт проходить скринінг, лікування за протоколом і фінальний замір. Його (анонімізований) результат живить підтвердження для донора.',arch:'Beneficiary journey captured as FHIR resources; PHQ-9 baseline/follow-up Observations compute symptom-reduction Δ. Δ ≥ 50% emits an OutcomeAttestation event to the verification core. PII anonymized in donor reporting.'},
      auditor:{t:'Кабінет аудитора',donor:'Незалежний аудитор перевіряє звіти провайдерів, верифікує сертифікати та бачить повний аудит-трейл дій по кожній програмі.',arch:'Auditor role has read access across Provider Report + Credential registries; risk score = f(compliance%, verification status); all approve/reject actions are appended to an immutable audit log.'},
    };
    function renderDocs(){
      const d=DOCS[cur];
      $('eco-docs-body').innerHTML=`<div class="mono" style="font-size:.54rem;letter-spacing:3px;color:#5f8088;text-transform:uppercase;margin-bottom:10px;">// документація</div>`
        +`<div class="cond" style="font-size:1.2rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#D4A574;margin-bottom:12px;">${d.t}</div>`
        +`<div style="font-size:.72rem;color:#F5F2ED;line-height:1.65;margin-bottom:10px;">${d.donor}</div>`
        +`<div style="font-size:.62rem;color:#8CA8AC;line-height:1.55;margin-bottom:16px;">${d.arch}</div>`
        +`<div class="mono" style="font-size:.54rem;letter-spacing:2px;color:#5f8088;text-transform:uppercase;margin-bottom:8px;">// стандарти</div>`
        +`<div style="display:flex;flex-direction:column;gap:7px;">`
        +[['HL7 FHIR R4','Клінічні дані: Patient, CarePlan, Encounter, Observation (PHQ-9).'],['W3C Verifiable Credentials','Сертифікація провайдера та підтвердження результату.'],['ISO 20022','Платіжні доручення pacs.008 для розрахунку за результатом.'],['Blockchain settlement','Незмінний аудиторський запис кожної виплати.'],['ЄСОЗ / Трембіта','Інтеграція з державною інфраструктурою eHealth.']].map(([a,b])=>`<div style="border:1px solid #2a5562;border-left:2px solid #D4A574;border-radius:2px;padding:8px 10px;"><div class="mono" style="font-size:.56rem;color:#D4A574;letter-spacing:.5px;">${a}</div><div style="font-size:.6rem;color:#A9C2C8;line-height:1.4;margin-top:3px;">${b}</div></div>`).join('')
        +`</div>`;
    }

    // ─────────── RING SUB-NAV → switch cabinets ───────────
    if(!window.__ecoRingSub){
      window.__ecoRingSub=true;
      window.addEventListener('ring-subnav', e=>{
        const d=e.detail||{};
        if(d.site!=='cabinets' || !d.si) return;
        const key=d.si==='provider'?'provider':d.si;
        // While already viewing Огляд, donor/provider/beneficiary sub-items just filter/highlight
        // their own lane on the trigger diagram (per Alex) — they do NOT jump into the cabinet.
        // Cabinet entry only happens via the qualifying-question link at the page bottom.
        // 'home'/'auditor' have no lane on the diagram (auditor never appears in the beneficiary
        // journey), so those still navigate directly.
        if(cur==='home' && CAB_ACTOR_KEYS.includes(key)){
          homeHighlight = homeHighlight===key ? null : key;
          renderHome();
        } else {
          go(key);
        }
      });
    }

    // ─────────── INIT ───────────
    go('home'); renderDocs();
  }
}
</script>
</body>
</html>
