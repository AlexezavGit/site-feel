
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { originalFetch = v; },
            configurable: true
          });
        } catch (e) {}

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feel Again - Strategic Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"DM Sans"', 'sans-serif'],
              display: ['"Space Grotesk"', 'sans-serif'],
            },
            colors: {
              primary: '#000000', 
              'bloomberg-orange': '#ea580c',
              'bloomberg-gold': '#A37E2C', 
            },
            animation: {
              'pulse-red': 'breathing 4s ease-in-out infinite',
              'flow': 'flow 2s linear infinite',
              'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              'breathing': {
                '0%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.4)', borderColor: 'rgba(239, 68, 68, 0.4)' },
                '50%': { transform: 'scale(1.02)', boxShadow: '0 0 20px 0 rgba(239, 68, 68, 0.7)', borderColor: 'rgba(239, 68, 68, 1)' },
                '100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.4)', borderColor: 'rgba(239, 68, 68, 0.4)' },
              },
              'flow': {
                '0%': { strokeDashoffset: '20' },
                '100%': { strokeDashoffset: '0' }
              },
              'pulse-glow': {
                '0%, 100%': { boxShadow: '0 0 20px rgba(234, 88, 12, 0.1)', borderColor: 'rgba(234, 88, 12, 0.2)' },
                '50%': { boxShadow: '0 0 40px rgba(234, 88, 12, 0.4)', borderColor: 'rgba(234, 88, 12, 0.6)' }
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Core */
        --gold: #8b6914;
        --gold-light: #c8a45c;
        --teal: #1a8a7e;
        --teal-bright: #2ec4b6;
        --red: #b5331f;
        --red-bright: #e05545;
        --green: #2a7a50;
        --navy: #0a1628;
        /* Backgrounds */
        --bg-light: #f2f0eb;
        --bg-dark: #080f1c;
        --surface-light: #ffffff;
        --surface-dark: #0f1826;
        /* Text */
        --text-light: #1f2430;
        --text-dark: #c8cdd8;
        --text-sec-light: #5a6375;
        --text-sec-dark: #6e7a90;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-dark);
        overflow-x: hidden;
      }

      h1, h2, h3, h4, h5, h6, .font-display, .metric-value, .btn-primary {
        font-family: 'Space Grotesk', sans-serif;
      }
      
      /* Canonical Hero Background */
      .hero-bg-canonical {
        background: linear-gradient(135deg, #0a1628 0%, #1a0a0a 100%);
        position: relative;
      }

      .hero-bg-canonical::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 60% at 20% 60%, rgba(0,210,170,0.28) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 50% at 80% 40%, rgba(0,180,200,0.18) 0%, transparent 50%),
                    radial-gradient(ellipse 50% 40% at 50% 110%, rgba(46,196,182,0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      .hero-top-border {
        position: absolute;
        top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, transparent 0%, #00d4aa 30%, #2ec4b6 60%, rgba(200,164,92,0.6) 100%);
        box-shadow: 0 0 24px rgba(0,212,170,0.6);
        z-index: 10;
      }

      .hero-glow {
        position: absolute;
        bottom: -20%; left: 50%;
        transform: translateX(-50%);
        width: 80%; height: 50%;
        background: radial-gradient(ellipse at center, rgba(0,210,170,0.2) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .section-label {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gold-light);
      }

      /* Card components */
      .canonical-card {
        border: 1px solid rgba(139, 105, 20, 0.4); /* gold-dim */
        transition: border 0.2s ease-out;
      }
      .canonical-card:hover {
        border-color: var(--gold-light);
      }

      .metric-card-1 {
        background: rgba(224,85,69,0.12);
        border: 1px solid rgba(224,85,69,0.3);
      }
      .metric-text-1 {
        color: #ff7b6e;
        text-shadow: 0 0 12px rgba(255,123,110,0.6);
      }

      .metric-card-2 {
        background: rgba(0,210,170,0.10);
        border: 1px solid rgba(0,210,170,0.3);
      }
      .metric-text-2 {
        color: #00d4aa;
        text-shadow: 0 0 12px rgba(0,212,170,0.8);
      }

      .metric-card-3 {
        background: rgba(200,164,92,0.10);
        border: 1px solid rgba(200,164,92,0.3);
      }
      .metric-text-3 {
        color: #e8c97a;
        text-shadow: 0 0 12px rgba(232,201,122,0.6);
      }

      /* Old Bloomberg bg fallback if used */
      .bloomberg-bg {
        background: linear-gradient(180deg, #f97316 0%, #c2410c 35%, #451a03 70%, #000000 100%);
        background-attachment: fixed;
        background-size: cover;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0; pointer-events: none;
      }
      
      .content-card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease-out;
      }
      
      .content-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-dark); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--teal-bright); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--teal); 
      }
    </style>

</head>

</html>
